<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <style>
      .title {
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-weight: 800;
        font-size: 42px;
        fill: url(#textGrad);
        letter-spacing: 2px;
      }
      .subtitle {
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-weight: 400;
        font-size: 16px;
        fill: #94a3b8;
        letter-spacing: 4px;
      }
      .glow-dot {
        fill: #a855f7;
        animation: pulse 3s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.5); }
      }
    </style>
  </defs>
  <rect width="800" height="200" rx="10" fill="url(#grad)" />
  <circle cx="100" cy="50" r="3" class="glow-dot" style="animation-delay: 0s" />
  <circle cx="700" cy="150" r="4" class="glow-dot" style="animation-delay: 1.5s" />
  <circle cx="400" cy="30" r="2" class="glow-dot" style="animation-delay: 0.7s" />
  <text x="50%" y="100" text-anchor="middle" class="title">SANJAY SEKAR</text>
  <text x="50%" y="140" text-anchor="middle" class="subtitle">BACKEND ENGINEER • SYSTEM ARCHITECT</text>
</svg>
